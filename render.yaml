services:
  # ── Backend: Node/Express API ────────────────────────────────────────────
  - type: web
    name: devbhoomi-backend
    runtime: node
    rootDir: backend/backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      # Set this to your frontend's Render URL, e.g. https://devbhoomi-frontend.onrender.com
      # Comma-separate multiple origins if needed (e.g. custom domain + Render URL).
      - key: CLIENT_URL
        sync: false
      - key: MONGO_URI
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      # Add any other secrets your .env.example lists (Cloudinary, Razorpay, SMTP, etc.)

  # ── Frontend: Vite static build ──────────────────────────────────────────
  - type: web
    name: devbhoomi-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      # Set this to your backend's Render URL, e.g. https://devbhoomi-backend.onrender.com
      # NOTE: origin only, no trailing slash, no "/api" suffix — the code appends that itself.
      - key: VITE_API_URL
        sync: false
    routes:
      # Fixes "Not Found" on refresh/deep-link: React Router (BrowserRouter)
      # handles routes like /dashboard client-side, but a hard refresh asks
      # the static host for that exact path, which doesn't exist as a file.
      # This rewrite sends every request to index.html so the SPA can boot
      # and let the router take over.
      - type: rewrite
        source: /*
        destination: /index.html
